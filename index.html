<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Widgetable Calculator</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="calculator" role="application" aria-label="Pixel art calculator">
    <div class="calc-brand">PIXEL LOVE CALC</div>

    <div class="display-wrap">
      <div class="display" id="display" aria-live="polite" aria-label="Calculator display">
        <div class="expr" id="expr-line"></div>
        <div class="main" id="main-line">0</div>
      </div>
    </div>

    <div class="btn-grid" id="btn-grid">
      <button class="btn btn-ac"    data-action="ac">AC</button>
      <button class="btn btn-clear" data-action="back">DEL</button>
      <button class="btn btn-op"    data-action="op" data-val="%">%</button>
      <button class="btn btn-op"    data-action="op" data-val="÷">÷</button>

      <button class="btn btn-num"   data-action="num" data-val="7">7</button>
      <button class="btn btn-num"   data-action="num" data-val="8">8</button>
      <button class="btn btn-num"   data-action="num" data-val="9">9</button>
      <button class="btn btn-op"    data-action="op"  data-val="×">×</button>

      <button class="btn btn-num"   data-action="num" data-val="4">4</button>
      <button class="btn btn-num"   data-action="num" data-val="5">5</button>
      <button class="btn btn-num"   data-action="num" data-val="6">6</button>
      <button class="btn btn-op"    data-action="op"  data-val="−">−</button>

      <button class="btn btn-num"   data-action="num" data-val="1">1</button>
      <button class="btn btn-num"   data-action="num" data-val="2">2</button>
      <button class="btn btn-num"   data-action="num" data-val="3">3</button>
      <button class="btn btn-op"    data-action="op"  data-val="+">+</button>

      <button class="btn btn-num"   data-action="num" data-val="0" style="grid-column: span 2;">0</button>
      <button class="btn btn-num"   data-action="dot">.</button>
      <button class="btn btn-eq"    data-action="eq">=</button>
    </div>

    <div class="pixel-decor">
      <div class="pixel-dot lit"></div>
      <div class="pixel-dot"></div>
      <div class="pixel-dot"></div>
      <div class="pixel-dot"></div>
      <div class="pixel-dot"></div>
    </div>
  </div>

  <script src="script.js"></script>

</body>
</html>
